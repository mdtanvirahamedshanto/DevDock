name: Release Pipeline

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build TurboRepo
        run: pnpm run build

      - name: Package Desktop App (Mac)
        if: matrix.os == 'macos-latest'
        run: cd apps/desktop && npx electron-builder --mac -p always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Desktop App (Windows)
        if: matrix.os == 'windows-latest'
        run: cd apps/desktop && npx electron-builder --win -p always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Desktop App (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cd apps/desktop && npx electron-builder --linux -p always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
